<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TheLink Passport</title>
  <style>
    :root { --purple:#bcbfff; --lime:#e8ff6a; --dark:#101214; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; background:#101214; color:white; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif; overflow-x:hidden; }
    .page { position:relative; min-height:100vh; padding:24px; display:flex; align-items:center; justify-content:center; }
    .glow-a,.glow-b { position:fixed; width:440px; height:440px; border-radius:999px; filter:blur(70px); opacity:.28; pointer-events:none; z-index:0; }
    .glow-a { top:-180px; right:-130px; background:var(--purple); }
    .glow-b { bottom:-180px; left:-130px; background:var(--lime); }
    .app { position:relative; z-index:1; width:min(1080px,100%); display:grid; grid-template-columns:.85fr 1.15fr; gap:20px; animation:enter .45s ease both; }
    @keyframes enter { from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:translateY(0)} }
    .card { background:rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.16); border-radius:28px; box-shadow:0 24px 70px rgba(0,0,0,.28); backdrop-filter:blur(14px); overflow:hidden; }
    .panel { padding:32px; }
    .brand-row { display:flex; gap:14px; align-items:center; margin-bottom:24px; }
    .brand-icon { width:52px; height:52px; border-radius:18px; background:var(--lime); display:flex; align-items:center; justify-content:center; font-size:26px; }
    h1,h2,p { margin:0; }
    h1 { font-size:clamp(30px,4vw,44px); line-height:1.02; letter-spacing:-.04em; }
    .muted { color:rgba(255,255,255,.68); line-height:1.55; }
    .intro { background:rgba(255,255,255,.10); border:1px solid rgba(255,255,255,.14); border-radius:24px; padding:18px; margin-bottom:18px; line-height:1.55; }
    label { display:block; font-size:14px; color:rgba(255,255,255,.78); margin-bottom:7px; font-weight:700; }
    input { width:100%; height:52px; border:0; outline:0; border-radius:18px; background:rgba(255,255,255,.96); color:#111; font:inherit; padding:12px 14px; }
    .field { margin-bottom:15px; }
    .school-buttons { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px; }
    .school-button { min-height:52px; border:1px solid rgba(255,255,255,.18); border-radius:18px; background:rgba(255,255,255,.12); color:white; font:inherit; font-weight:850; cursor:pointer; padding:10px; }
    .school-button.active { background:var(--lime); color:#111; border-color:var(--lime); }
    .button { width:100%; height:52px; border:0; border-radius:18px; background:var(--lime); color:#111; font:inherit; font-weight:900; cursor:pointer; transition:transform .12s ease, opacity .12s ease; }
    .button:hover { opacity:.92; } .button:active { transform:scale(.99); }
    .secondary { background:white; color:#111; margin-top:16px; }
    .error { display:none; border-radius:18px; padding:14px; margin-bottom:14px; background:rgba(255,70,70,.16); border:1px solid rgba(255,160,160,.25); color:white; font-size:14px; line-height:1.5; }
    .passport-card { background:white; color:var(--dark); border:0; border-radius:28px; overflow:hidden; box-shadow:0 24px 70px rgba(0,0,0,.28); min-height:560px; animation:pop .25s ease both; }
    @keyframes pop { from{opacity:0; transform:scale(.98)} to{opacity:1; transform:scale(1)} }
    .passport-top { padding:30px; background:linear-gradient(135deg,var(--purple),white 55%,var(--lime)); }
    .passport-head { display:flex; justify-content:space-between; align-items:flex-start; gap:18px; }
    .badge { display:inline-flex; align-items:center; gap:8px; border-radius:999px; background:rgba(0,0,0,.84); color:white; padding:9px 14px; font-weight:800; font-size:14px; }
    .student-name { margin-top:20px; font-size:clamp(36px,5vw,58px); line-height:.95; font-weight:950; letter-spacing:-.05em; }
    .school-name { margin-top:10px; color:rgba(0,0,0,.68); font-weight:700; }
    .route-icon { font-size:clamp(58px,8vw,82px); }
    .passport-body { padding:28px; }
    .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .info-box { display:flex; align-items:center; gap:12px; background:rgba(0,0,0,.04); border:1px solid rgba(0,0,0,.09); border-radius:22px; padding:15px; }
    .info-icon { flex:0 0 auto; width:46px; height:46px; border-radius:17px; display:flex; align-items:center; justify-content:center; background:white; box-shadow:0 8px 18px rgba(0,0,0,.08); font-size:20px; }
    .info-label { font-size:13px; color:rgba(0,0,0,.50); font-weight:850; margin-bottom:3px; }
    .info-value { font-size:20px; font-weight:950; }
    .mission { margin-top:18px; border:2px dashed rgba(0,0,0,.18); border-radius:24px; padding:18px; background:rgba(0,0,0,.03); }
    .mission-label { font-size:13px; color:rgba(0,0,0,.55); font-weight:850; margin-bottom:8px; }
    .mission-text { font-size:18px; font-weight:720; line-height:1.55; }
    .photo-note { margin-top:18px; border-radius:24px; padding:18px; background:var(--dark); color:white; }
    .photo-title { font-size:18px; font-weight:850; margin-bottom:6px; }
    .photo-text { color:rgba(255,255,255,.76); line-height:1.45; }
    .empty { min-height:560px; display:flex; align-items:center; justify-content:center; text-align:center; padding:32px; }
    .empty-icon { font-size:74px; margin-bottom:18px; } .empty h2 { font-size:32px; margin-bottom:10px; }
    @media (max-width:900px){ .page{padding:14px; align-items:flex-start}.app{grid-template-columns:1fr}.panel,.passport-top,.passport-body{padding:22px}.info-grid,.school-buttons{grid-template-columns:1fr}.passport-head{flex-direction:column-reverse}.route-icon{align-self:flex-start} }
  </style>
</head>
<body>
  <main class="page">
    <div class="glow-a"></div><div class="glow-b"></div>
    <section class="app">
      <div class="card panel">
        <div class="brand-row">
          <div class="brand-icon">🔗</div>
          <div><h1>TheLink Passport</h1><p class="muted">מצאו את הדרכון שלכם למסע</p></div>
        </div>
        <div class="intro">הכניסו את השם שלכם ובחרו את בית הספר. הדרכון יציג לכם לאיזה מסלול, צוות וחדר פרטי אתם שייכים.</div>
        <form onsubmit="findPassport(event)">
          <div class="field"><label for="searchName">שם מלא</label><input id="searchName" placeholder="לדוגמה: נועה כהן" autocomplete="name" /></div>
          <label>בית ספר</label>
          <div id="schoolButtons" class="school-buttons"></div>
          <input id="selectedSchool" type="hidden" />
          <div id="notFound" class="error">לא מצאתי תלמיד/ה בשם הזה ברשימת השיבוץ. בדקו את האיות או פנו למנחה.</div>
          <button class="button" type="submit">קבלו את הדרכון שלי</button>
        </form>
      </div>
      <div id="resultArea" class="card empty"><div><div class="empty-icon">🪪</div><h2>הדרכון יופיע כאן</h2><p class="muted" style="max-width:420px;margin:0 auto;">הכניסו שם ובית ספר כדי לקבל את הדרכון שלכם.</p></div></div>
    </section>
  </main>

  <script>
    // =============================
    // EDIT HERE: school names + lists
    // =============================
    const SCHOOL_A_NAME = "אפק";
    const SCHOOL_B_NAME = "חשמונאי";
    const LIST_A = [רותם ניסים


גלי עמאר


כפיר סויסה


אמה וייס


אורן צדוק


אלהם ח׳ורי


טליה סהר


נועם פדידה


שחר גבאי


כרמל אוחיון


יהלי ברוך


ריף דהן


אופק לנדאו


הדר אלימלך


ניר סבג


ליה רפאלי


עומרי קשת


אריאל זיו


ספיר אלקיים


אייל רז


דפנה שלו


מתן קורן


נוגה פלג


יאיר תמיר


רומי בן עמי


איתמר פרידמן


טוהר אטיאס


שי מנור


עמית לביא


אלמה רבינוביץ׳

];
    const LIST_B = ["נועה לוי
איתי כהן
מאיה אברהם
עומר מזרחי
יעל ביטון
דניאל פרץ
תמר אזולאי
רועי שפירא
שירה גולן
אורי בן דוד
ליאן חדד
יונתן מלכה
אלה ברק
עידו רוזן
מיכל דיין
אביב סלע
נעמה קפלן
גיא הררי
רוני וקנין
ליהי שטרן
עדי מור
נטע אלון
יובל חן
ליאור שרעבי
הילה צור
עידן אשכנזי
שקד לוין
אמיר בלום
מיקה ישראלי
אלון דרור"];

    const ROUTES = [
      { id:"ofek", name:"מסלול אופק", icon:"🌅", room:"מרחב אופק" },
      { id:"lab", name:"מסלול מעבדה", icon:"🔬", room:"מרחב מעבדה" },
      { id:"compass", name:"מסלול מצפן", icon:"🧭", room:"מרחב מצפן" },
      { id:"spark", name:"מסלול ניצוץ", icon:"✨", room:"מרחב ניצוץ" },
      { id:"bridge", name:"מסלול גשר", icon:"🌉", room:"מרחב גשר" },
    ];
    let assignments = [];

    function cleanText(value){ return String(value || "").replace(String.fromCharCode(65279), "").trim(); }
    function normalize(value){ let text = cleanText(value).toLowerCase(); while(text.indexOf("  ") >= 0) text = text.split("  ").join(" "); return text; }
    function uniqueStudents(names, school){ const seen = new Set(); const students = []; names.forEach(function(name){ const cleanName = cleanText(name); const key = normalize(cleanName) + "|" + normalize(school); if(!cleanName || seen.has(key)) return; seen.add(key); students.push({ name:cleanName, school:school }); }); return students; }
    function shuffleStable(list){ return list.map(function(item,index){ return { item:item, sort:Math.sin(index + cleanText(item.name).length * 999) }; }).sort(function(a,b){ return a.sort - b.sort; }).map(function(entry){ return entry.item; }); }
    function divideIntoTeams(studentsA, studentsB){ const listA = shuffleStable(studentsA); const listB = shuffleStable(studentsB); const nextAssignments = []; let indexA=0, indexB=0, teamNumber=1; while(indexA < listA.length || indexB < listB.length){ const route = ROUTES[(teamNumber - 1) % ROUTES.length]; const members = []; for(let i=0; i<2 && indexA<listA.length; i++){ members.push(listA[indexA]); indexA++; } for(let i=0; i<2 && indexB<listB.length; i++){ members.push(listB[indexB]); indexB++; } members.forEach(function(student){ nextAssignments.push({ name:student.name, school:student.school, route:route, team:teamNumber, privateRoom:"חדר פרטי " + teamNumber }); }); teamNumber++; } return nextAssignments; }

    function init(){
      const studentsA = uniqueStudents(LIST_A, SCHOOL_A_NAME);
      const studentsB = uniqueStudents(LIST_B, SCHOOL_B_NAME);
      assignments = divideIntoTeams(studentsA, studentsB);
      renderSchoolButtons([SCHOOL_A_NAME, SCHOOL_B_NAME]);
    }

    function renderSchoolButtons(schools){
      const holder = document.getElementById("schoolButtons");
      holder.innerHTML = "";
      schools.forEach(function(school, index){
        const button = document.createElement("button");
        button.type = "button";
        button.className = "school-button" + (index === 0 ? " active" : "");
        button.textContent = school;
        button.onclick = function(){ selectSchool(school); };
        holder.appendChild(button);
      });
      document.getElementById("selectedSchool").value = schools[0] || "";
    }

    function selectSchool(school){
      document.getElementById("selectedSchool").value = school;
      Array.from(document.querySelectorAll(".school-button")).forEach(function(btn){ btn.classList.toggle("active", btn.textContent === school); });
    }

    function findPassport(event){
      event.preventDefault();
      const name = document.getElementById("searchName").value;
      const school = document.getElementById("selectedSchool").value;
      const match = assignments.find(function(item){ return normalize(item.name) === normalize(name) && normalize(item.school) === normalize(school); });
      if(!match){ document.getElementById("notFound").style.display = "block"; return; }
      document.getElementById("notFound").style.display = "none";
      renderPassport(match);
    }

    function renderPassport(passport){
      const area = document.getElementById("resultArea");
      area.className = "passport-card";
      area.innerHTML = `
        <div class="passport-top"><div class="passport-head"><div><div class="badge">✨ TheLink Mission Passport</div><h2 class="student-name">${escapeHtml(passport.name)}</h2><p class="school-name">${escapeHtml(passport.school)}</p></div><div class="route-icon">${passport.route.icon}</div></div></div>
        <div class="passport-body">
          <div class="info-grid">${infoBox("🧭","המסלול שלי",passport.route.name)}${infoBox("👥","הצוות שלי","צוות " + passport.team)}${infoBox("▢","החדר שלי",passport.privateRoom)}${infoBox("🏫","מרחב המסלול שלי",passport.route.room)}</div>
          <div class="mission"><p class="mission-label">המשימה הראשונה</p><p class="mission-text">לאחר שהגעתם למרחב של המסלול, היכנסו לחדר הפרטי על פי המספר שקיבלתם בדרכון. אתם מוזמנים להציג את עצמכם: השם כמובן, משהו שאני אוהב/ת לעשות, משהו שאני ממש טוב/ה בו, חוויה מעניינת שעברתי, ואם היה לי מטה קסם — מה הייתי משנה בעולם.</p></div>
          <div class="photo-note"><p class="photo-title">צלמו את הדרכון בטלפון 📸</p><p class="photo-text">שמרו צילום מסך של הדרכון, כדי שתדעו לאיזה מסלול, צוות וחדר פרטי אתם שייכים.</p></div>
          <button class="button secondary" onclick="resetSearch()">חיפוש תלמיד נוסף</button>
        </div>`;
    }
    function infoBox(icon,label,value){ return `<div class="info-box"><div class="info-icon">${icon}</div><div><p class="info-label">${escapeHtml(label)}</p><p class="info-value">${escapeHtml(value)}</p></div></div>`; }
    function resetSearch(){ document.getElementById("searchName").value = ""; document.getElementById("notFound").style.display = "none"; const area = document.getElementById("resultArea"); area.className = "card empty"; area.innerHTML = `<div><div class="empty-icon">🪪</div><h2>הדרכון יופיע כאן</h2><p class="muted" style="max-width:420px;margin:0 auto;">הכניסו שם ובית ספר כדי לקבל את הדרכון שלכם.</p></div>`; }
    function escapeHtml(value){ return String(value || "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"); }
    init();
  </script>
</body>
</html>
